upstream react {
    server ocp-frontend:5173;
}

upstream fastapi {
    server ocp-backend:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;

