# SonarCloud config — AMS monorepo
sonar.projectKey=TobbenTT_ams-monorepo-sonar
sonar.organization=tobbentt
sonar.host.url=https://sonarcloud.io

# Layout del monorepo
sonar.sources=apps,packages,scripts
sonar.tests=tests
sonar.python.version=3.11,3.12,3.13

# Coverage (lo genera pytest-cov en el workflow)
sonar.python.coverage.reportPaths=coverage.xml

# Resuelve ambigüedad de __init__.py (varios paquetes lo tienen)
# indicando los source roots Python explícitamente.
sonar.python.source=apps/core,packages

# Excluir del CÁLCULO DE COBERTURA (no del análisis) — para que el % no se
# arruine con archivos que nunca se van a testear unitariamente (frontend JS,
# scripts one-shot, scaffolds, código AI-heavy que requiere mocks complejos).
sonar.coverage.exclusions=\
  apps/admin/**,\
  apps/field/**,\
  apps/sap_mock/**,\
  scripts/**,\
  packages/agents/**,\
  packages/skills/**,\
  packages/tools/processors/**,\
  packages/tools/validators/**,\
  packages/tools/engines/scoring_strategies/**,\
  packages/tools/engines/trace_engine.py,\
  packages/tools/engines/feedback_engine.py,\
  packages/tools/engines/manual_loader.py,\
  packages/tools/engines/template_population_engine.py,\
  packages/tools/engines/milestone_state_engine.py,\
  packages/tools/engines/spec_engine.py,\
  packages/tools/engines/expert_knowledge_engine.py,\
  packages/tools/engines/troubleshooting_engine.py,\
  packages/tools/engines/file_parser_engine.py,\
  packages/tools/engines/deliverable_writer.py,\
  packages/tools/engines/ams_deliverable_registry.py,\
  packages/tools/engines/ams_output_validator.py,\
  apps/core/api/ai_core/**,\
  apps/core/api/routers/ai_agents.py,\
  apps/core/api/routers/agentic.py,\
  apps/core/api/routers/programmer_agent.py,\
  apps/core/api/routers/supervisor_agent.py,\
  apps/core/api/routers/planificador_agent.py,\
  apps/core/api/routers/troubleshooting.py,\
  apps/core/api/routers/mfa.py,\
  apps/core/api/services/agentic_*.py,\
  apps/core/api/services/synthetic_data_generator.py,\
  apps/core/api/services/expert_knowledge_service.py,\
  apps/core/api/services/sap_rfc_connector.py,\
  apps/core/api/services/pptx_generator_service.py,\
  apps/core/api/services/ai_provider_service.py,\
  apps/core/api/services/blender_render_service.py,\
  apps/core/api/services/workflow_service.py,\
  apps/core/api/seed.py,\
  apps/core/api/seed_demo.py,\
  apps/core/api/seed_demo_data.py,\
  **/tests/**,\
  **/__init__.py

# Exclusiones
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  apps/admin/public/**,\
  data/**,\
  docs/**,\
  assets/**,\
  infrastructure/**,\
  scripts/install_docker_wsl.ps1

sonar.test.exclusions=tests/e2e/**

# Frontend (JS/JSX/TS)
sonar.javascript.lcov.reportPaths=apps/admin/coverage/lcov.info
