name: Security

on:
  push:
    branches: [main, demo-seed-data, feature/**]
  pull_request:
    branches: [main, demo-seed-data]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks · scan de secretos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_SUMMARY: "true"
