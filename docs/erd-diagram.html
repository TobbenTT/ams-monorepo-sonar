  'work_requests': '#3b82f6', 'managed_work_orders': '#3b82f6', 'work_orders': '#3b82f6',

  'failure_modes': '#f59e0b', 'measuring_points': '#f59e0b', 'bom_items': '#f59e0b',
  'inventory_items': '#f59e0b', 'spare_part_analyses': '#f59e0b', 'maintenance_plans': '#f59e0b',
  'maintenance_tasks': '#f59e0b', 'failure_catalog': '#f59e0b', 'field_captures': '#f59e0b',
  'shutdown_calendar': '#f59e0b', 'work_centers': '#f59e0b',
  'users': '#8b5cf6', 'workforce': '#8b5cf6',
  'kpi_metrics': '#ef4444', 'planning_kpi_snapshots': '#ef4444', 'de_kpi_snapshots': '#ef4444',
  'health_scores': '#ef4444', 'failure_predictions': '#ef4444',
  'notifications': '#3b82f6', 'permits_to_work': '#f59e0b',
  'rca_analyses': '#ef4444', 'improvement_actions': '#ef4444',
};

// Select tables to show
const CORE = new Set();
SCHEMA.relationships.forEach(r => { CORE.add(r.from_table); CORE.add(r.to_table); });
['plants','hierarchy_nodes','work_requests','managed_work_orders','workforce','users',
 'work_orders','failure_modes','inventory_items','backlog_items','work_packages',
 'measuring_points','bom_items','work_centers','shutdown_calendar','criticality_assessments',
 'maintenance_plans','field_captures','notifications','work_assignments','kpi_metrics',
 'failure_catalog','maintenance_tasks','rca_analyses','improvement_actions','permits_to_work',
 'health_scores','spare_part_analyses'].forEach(t => { if (SCHEMA.tables[t]) CORE.add(t); });

const tableList = [...CORE].sort();
const positions = {};
const TABLE_W = 220;
const ROW_H = 16;
const HEADER_H = 28;
const MAX_COLS = 8; // Max columns to show per table

// Auto-layout: grid
function autoLayout() {
  const cols = 6;
  const gapX = 280;
  const gapY = 40;
  tableList.forEach((t, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const colCount = Math.min(SCHEMA.tables[t].columns.length, MAX_COLS);
    positions[t] = { x: 60 + col * gapX, y: 80 + row * (HEADER_H + colCount * ROW_H + gapY) };
  });
  render();
}

// Render
function render() {
  const tablesG = document.getElementById('tables-group');
  const linesG = document.getElementById('lines-group');
  tablesG.innerHTML = '';
  linesG.innerHTML = '';

  // Draw tables
  tableList.forEach(t => {
    const pos = positions[t];
    const table = SCHEMA.tables[t];
    const cols = table.columns.slice(0, MAX_COLS);
    const color = COLOR_MAP[t] || '#64748b';
    const pkSet = new Set(table.pk || []);
    const fkSet = new Set();
    (table.fks || []).forEach(fk => fk.from.forEach(c => fkSet.add(c)));
    const bodyH = cols.length * ROW_H + 8;
    const totalH = HEADER_H + bodyH;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.classList.add('table-box');
    g.id = 'table-' + t;
    g.setAttribute('transform', `translate(${pos.x},${pos.y})`);

    // Header
    g.innerHTML = `
      <rect class="header" x="0" y="0" width="${TABLE_W}" height="${HEADER_H}" fill="${color}" stroke="${color}" stroke-width="2"/>
      <text x="10" y="18" fill="white" font-size="12" font-weight="bold">${t}</text>
      <text x="${TABLE_W - 8}" y="18" fill="white" font-size="9" text-anchor="end">${table.columns.length}cols</text>
      <rect class="body" x="0" y="${HEADER_H}" width="${TABLE_W}" height="${bodyH}" fill="#1e293b" stroke="${color}" stroke-width="1.5"/>
      ${cols.map((c, i) => {
        const y = HEADER_H + 14 + i * ROW_H;
        const isPk = pkSet.has(c.name);
        const isFk = fkSet.has(c.name);
        const icon = isPk ? '🔑' : isFk ? '🔗' : '  ';
        const fill = isPk ? '#f59e0b' : isFk ? '#818cf8' : '#cbd5e1';
        return `<text x="8" y="${y}" fill="${fill}" font-size="10">${icon} ${c.name} <tspan fill="#4a5568" font-size="9">${c.type.substring(0,12)}</tspan></text>`;
      }).join('')}
      ${table.columns.length > MAX_COLS ? `<text x="8" y="${HEADER_H + 14 + cols.length * ROW_H}" fill="#4a5568" font-size="9" font-style="italic">... +${table.columns.length - MAX_COLS} more</text>` : ''}
    `;

    // Drag
    let dragging = false, dx = 0, dy = 0;
    g.addEventListener('mousedown', e => {
      dragging = true;
      dx = e.clientX - pos.x * zoom;
      dy = e.clientY - pos.y * zoom;
      e.stopPropagation();
    });
    document.addEventListener('mousemove', e => {
      if (!dragging) return;
      pos.x = (e.clientX - dx) / zoom;
      pos.y = (e.clientY - dy) / zoom;
      g.setAttribute('transform', `translate(${pos.x},${pos.y})`);
      drawLines();
    });
    document.addEventListener('mouseup', () => { dragging = false; });

    tablesG.appendChild(g);
  });

  drawLines();
}

function drawLines() {
  const linesG = document.getElementById('lines-group');
  linesG.innerHTML = '';

  SCHEMA.relationships.forEach(r => {
    if (!positions[r.from_table] || !positions[r.to_table]) return;
    const from = positions[r.from_table];
    const to = positions[r.to_table];

    const x1 = from.x + TABLE_W;
    const y1 = from.y + HEADER_H / 2;
    const x2 = to.x;
    const y2 = to.y + HEADER_H / 2;

    // Bezier curve
    const cx = (x1 + x2) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`);
    path.setAttribute('stroke', '#818cf880');
    path.setAttribute('class', 'rel-line');
    linesG.appendChild(path);
  });
}

// Zoom & pan
let zoom = 0.85;
let panX = 0, panY = 0;
const zoomGroup = document.getElementById('zoom-group');

function applyTransform() {
  zoomGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${zoom})`);
}

document.getElementById('svg').addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= e.deltaY > 0 ? 0.92 : 1.08;
  zoom = Math.max(0.2, Math.min(3, zoom));
  applyTransform();
});

let panning = false, startPanX, startPanY;
document.getElementById('svg').addEventListener('mousedown', e => {
  if (e.target.closest('.table-box')) return;
  panning = true;
  startPanX = e.clientX - panX;
  startPanY = e.clientY - panY;
});
document.addEventListener('mousemove', e => {
  if (!panning) return;
  panX = e.clientX - startPanX;
  panY = e.clientY - startPanY;
  applyTransform();
});
document.addEventListener('mouseup', () => { panning = false; });

function resetZoom() { zoom = 0.85; panX = 0; panY = 0; applyTransform(); }

function highlightTable(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.table-box').forEach(g => {
    const name = g.id.replace('table-', '');
    g.style.opacity = !q || name.includes(q) ? 1 : 0.15;
  });
}

document.getElementById('info').textContent = `${tableList.length} tables · ${SCHEMA.relationships.length} relationships`;

autoLayout();
applyTransform();
</script>
