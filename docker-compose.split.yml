# docker-compose.split.yml — prueba de separación por servicio (Fase 1).
#
# Diferencia vs docker-compose.yml original:
# - Cada servicio expone su propio puerto y se puede arrancar SOLO con su
#   profile. Mañana podemos mover ams-admin a otro VPS sin tocar ams-core.
# - Healthchecks separados: si ams-admin se cae, ams-core sigue.
# - El proxy nginx pasa de "todo o nada" a "ruteador real".
#
# Uso:
#   docker compose -f docker-compose.split.yml up -d                  # todo
#   docker compose -f docker-compose.split.yml --profile core up -d   # solo backend
#   docker compose -f docker-compose.split.yml --profile admin up -d  # solo frontend
#   docker compose -f docker-compose.split.yml --profile sap up -d    # solo sap-mock
#
# Cada profile tiene depends_on solo de lo que necesita realmente.

services:
  # ── ams-core: backend Python (api + tools + agents + skills) ─────
  ams-core:
    build: .
    container_name: ams-core
    profiles: ["core", "all"]
    ports:
      - "${CORE_PORT:-8000}:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - SERVICE_NAME=ams-core
    volumes:
      - ./data:/app/data
      - ams_core_deliverables:/app/or_deliverables
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - ams-net

  # ── ams-admin: frontend React (build estático servido por Vite preview) ─
  ams-admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SENTRY_DSN: "${VITE_SENTRY_DSN:-}"
    container_name: ams-admin
    profiles: ["admin", "all"]
    ports:
      - "${ADMIN_PORT:-5173}:5173"
    restart: unless-stopped
    networks:
      - ams-net

  # ── ams-field: mobile app (React/Vite) ────────────────────────────
  # NOTA: field_app/ no tiene Dockerfile aún — placeholder; pendiente Fase 1.5.
  # ams-field:
  #   build:
  #     context: ./field_app
  #     dockerfile: Dockerfile
  #   container_name: ams-field
  #   profiles: ["field", "all"]
  #   ports:
  #     - "${FIELD_PORT:-5174}:5173"
  #   networks:
  #     - ams-net

  # ── ams-sap-mock: simulador OData S/4HANA ────────────────────────
  ams-sap-mock:
    build:
      context: ./apps/sap_mock/server
      dockerfile: Dockerfile
    container_name: ams-sap-mock
    profiles: ["sap", "all"]
    ports:
      - "${SAP_MOCK_PORT:-8030}:8000"
    environment:
      - MOCK_DB_PATH=/data/mock.db
      - MOCK_SEED_ON_BOOT=true
    volumes:
      - ams_sap_mock_data:/data
    restart: unless-stopped
    networks:
      - ams-net

  # ── ams-edge: nginx reverse proxy (única puerta pública) ─────────
  ams-edge:
    image: nginx:1.29-alpine
    container_name: ams-edge
    profiles: ["all"]
    ports:
      - "${EDGE_PORT:-8080}:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ams-core:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ams-net

networks:
  ams-net:
    name: ams-split-net
    driver: bridge

volumes:
  ams_core_deliverables:
    name: ams_core_deliverables
  ams_sap_mock_data:
    name: ams_sap_mock_data
