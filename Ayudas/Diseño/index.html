<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MAGEAM — Weekly Work Order Scheduler</title>
    <meta name="viewport" content="width=1440" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui'],
              mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            },
            colors: {
              brand: {
                50: '#ECFDF5',
                100: '#D1FAE5',
                500: '#10B981',
                600: '#047857',
                700: '#1B5E20',
                800: '#14532D',
              },
            },
            boxShadow: {
              card: '0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03)',
              pop: '0 10px 30px -10px rgba(15, 23, 42, 0.25), 0 4px 10px -4px rgba(15, 23, 42, 0.08)',
              drag: '0 20px 40px -12px rgba(16, 185, 129, 0.45), 0 8px 16px -8px rgba(15, 23, 42, 0.25)',
            },
          },
        },
      };
    </script>
    <style>
      html,
      body {
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      body {
        overflow-x: auto;
      }
      /* Subtle grid bg for the canvas */
      .bg-canvas-grid {
        background-image: radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.04) 1px, transparent 0);
        background-size: 22px 22px;
      }
      /* Dashed drop zone highlight pulse */
      @keyframes dropPulse {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.35);
        }
        50% {
          box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);
        }
      }
      .drop-pulse {
        animation: dropPulse 1.8s ease-in-out infinite;
      }
      /* Ghost drag card wobble */
      @keyframes ghostFloat {
        0%,
        100% {
          transform: rotate(-3deg) translateY(0);
        }
        50% {
          transform: rotate(-3deg) translateY(-3px);
        }
      }
      .ghost-float {
        animation: ghostFloat 2.4s ease-in-out infinite;
      }
      /* custom scrollbar for rails */
      .thin-scroll::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .thin-scroll::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 9999px;
      }
      .thin-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <!-- lucide icons (UMD) -->
    <script src="https://unpkg.com/lucide@0.454.0/dist/umd/lucide.min.js"></script>
  </head>
  <body class="min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-presets="react" src="src/icons.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/data.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/parts.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/scheduler.jsx"></script>
    <script type="text/babel" data-presets="react" src="src/app.jsx"></script>
  </body>
</html>
