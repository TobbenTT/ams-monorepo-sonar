name: Backend tests

on:
  push:
    branches: [feature/multi-plant, demo-seed-data, main]
  pull_request:
    branches: [demo-seed-data, main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      JWT_SECRET_KEY: ci_jwt_key_at_least_32_chars_long_for_ci_runs_only
      TESTING: "1"
      DEBUG: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          python -m pytest tests/test_api \
            -q --no-header --disable-warnings --tb=short \
            -p no:cacheprovider

      - name: Dependency audit (pip-audit)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit --desc --progress-spinner off || true
