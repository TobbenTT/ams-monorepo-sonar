# SonarCloud config — AMS monorepo
sonar.projectKey=TobbenTT_ams-monorepo-sonar
sonar.organization=tobbentt
sonar.host.url=https://sonarcloud.io

# Layout del monorepo
sonar.sources=apps,packages,scripts
sonar.tests=tests
sonar.python.version=3.11,3.12,3.13

# Coverage (lo genera pytest-cov en el workflow)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusiones
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  apps/admin/public/**,\
  data/**,\
  docs/**,\
  assets/**,\
  infrastructure/**,\
  scripts/install_docker_wsl.ps1

sonar.test.exclusions=tests/e2e/**

# Frontend (JS/JSX/TS)
sonar.javascript.lcov.reportPaths=apps/admin/coverage/lcov.info
