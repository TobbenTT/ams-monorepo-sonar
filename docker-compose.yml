version: "3.9"

services:
  ocp-backend:
    build: .
    container_name: ocp-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app/apps/core:/app/packages:/app/apps
    volumes:
      - ./data:/app/data
      - ocp_sap_data:/app/sap_mock/data
      - ocp_or_deliverables:/app/or_deliverables
      - ocp_hf_cache:/home/appuser/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    networks:
      - ocp-network

  ocp-frontend:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SENTRY_DSN: "${VITE_SENTRY_DSN:-}"
    container_name: ocp-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      ocp-backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    networks:
      - ocp-network

  # Mock SAP S/4HANA — servicio de desarrollo + tests E2E.
  # Solo arranca con perfil "with-sap-mock". Para activarlo:
  #   docker compose --profile with-sap-mock up -d
  # En el backend, set SAP_TRANSPORT=mock y SAP_MOCK_URL=http://ocp-sap-mock:8000
  ocp-sap-mock:
    build:
      context: ./apps/sap_mock/server
      dockerfile: Dockerfile
    container_name: ocp-sap-mock
    profiles: ["with-sap-mock"]
    ports:
      - "${SAP_MOCK_PORT:-8030}:8000"
    environment:
      - MOCK_DB_PATH=/data/mock.db
      - MOCK_LATENCY_MS_MIN=${MOCK_LATENCY_MS_MIN:-30}
      - MOCK_LATENCY_MS_MAX=${MOCK_LATENCY_MS_MAX:-200}
      - MOCK_ERROR_RATE=${MOCK_ERROR_RATE:-0}
      - MOCK_SEED_ON_BOOT=true
    volumes:
      - ocp_sap_mock_data:/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - ocp-network

  ocp-nginx:
    image: nginx:1.29-alpine
    container_name: ocp-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/certs:/etc/nginx/certs:ro
      - ocp_dms_docs:/usr/share/nginx/dms:ro
    depends_on:
      - ocp-backend
      - ocp-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - ocp-network

networks:
  ocp-network:
    name: ocp-maintenance-net
    driver: bridge

volumes:
  ocp_db_data:
    name: ocp_db_data
  ocp_sap_data:
    name: ocp_sap_data
  ocp_or_deliverables:
    name: ocp_or_deliverables
  ocp_dms_docs:
    name: ocp_dms_docs
  ocp_hf_cache:
    name: ocp_hf_cache
  ocp_sap_mock_data:
    name: ocp_sap_mock_data
