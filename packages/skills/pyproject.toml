[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ams-skills"
version = "2.0.0"
description = "AMS — Skill definitions (.md + minimal Python helpers)."
requires-python = ">=3.11"
dependencies = [
    "PyYAML>=6.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["skills*"]
