version: "3.9"

services:
  ocp-backend:
    build: .
    container_name: ocp-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file: .env
    environment:
      - PYTHONPATH=/app
    volumes:
      - ocp_db_data:/app/data
      - ocp_sap_data:/app/sap_mock/data
      - ocp_or_deliverables:/app/or_deliverables
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'
    networks:
      - ocp-network

  ocp-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_SENTRY_DSN: "${VITE_SENTRY_DSN:-}"
    container_name: ocp-frontend
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      ocp-backend:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'
    networks:
      - ocp-network

  ocp-nginx:
    image: nginx:1.29-alpine
    container_name: ocp-nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
      - "${NGINX_SSL_PORT:-8443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ocp_dms_docs:/usr/share/nginx/dms:ro
    depends_on:
      - ocp-backend
      - ocp-frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    networks:
      - ocp-network

networks:
  ocp-network:
    name: ocp-maintenance-net
    driver: bridge

volumes:
  ocp_db_data:
    name: ocp_db_data
  ocp_sap_data:
    name: ocp_sap_data
  ocp_or_deliverables:
    name: ocp_or_deliverables
  ocp_dms_docs:
    name: ocp_dms_docs
